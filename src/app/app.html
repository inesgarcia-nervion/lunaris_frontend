<div class="app-container">
  <app-header *ngIf="showHeader"></app-header>
  <router-outlet></router-outlet>
  <app-confirm-dialog></app-confirm-dialog>
  <footer class="app-footer" *ngIf="showFooter">
    <div class="footer-content horizontal">
      <div class="footer-item footer-copyright">©2025 Lunaris</div>
      <div class="footer-separator">•</div>
      <div class="footer-item footer-help">
        <span class="help-text">¿Necesitas ayuda?</span>
        <button *ngIf="!auth.isAdmin()" (click)="navigateToPeticiones()" class="footer-link">Accede a nuestras peticiones</button>
      </div>
      <div class="footer-separator">•</div>
      <div class="footer-item footer-terms">Terms &amp; Conditions</div>
    </div>
  </footer>
</div>

<style>
  .app-container {
    width: 100%;
    min-height: 100vh;
    background: var(--bg-page);
    display: flex;
    flex-direction: column;
  }

  .app-footer {
    margin-top: auto;
    padding: 1.5rem 2rem;
    background: var(--bg-page);
    color: var(--text-muted);
    font-size: 0.85rem;
    border-top: 1px solid var(--border-color);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 2rem;
    flex-direction: column;
    text-align: center;
  }

  .footer-content { display:flex; align-items:center; justify-content:center; gap:18px; width:100%; max-width:980px }
  .footer-content.horizontal { flex-direction:row; flex-wrap:wrap }
  .footer-item { display:flex; align-items:center; gap:8px }
  .footer-separator { color:var(--border-color) }
  .help-text { color:var(--text-secondary); font-weight:500 }
  .footer-link {
    background: linear-gradient(90deg, #5b6ef6, #8a5df5);
    color: white;
    border: none;
    padding: 0.45rem 0.85rem;
    border-radius: 999px;
    font-weight: 600;
    box-shadow: 0 8px 20px rgba(91,110,246,0.12);
    cursor: pointer;
    transition: transform 0.12s ease, box-shadow 0.12s ease;
  }
  .footer-link:hover { transform: translateY(-2px); box-shadow: 0 12px 28px rgba(91,110,246,0.18); }

  @media (max-width: 600px) {
    .app-footer { padding: 1rem 1rem; }
    .footer-content.horizontal { flex-direction: column; gap: 8px; }
    .footer-separator { display: none; }
    .footer-item.footer-help { flex-direction: column; gap: 6px; }
  }
</style>
