<div class="config-container">
  <h1>Configuración</h1>

  <section class="section">
    <h2>Cambiar nombre de usuario</h2>
    <div class="row">
      <input [(ngModel)]="newUsername" placeholder="Nuevo nombre de usuario" />
      <button (click)="submitChanges()" [disabled]="isSaving || !hasChanges">{{ isSaving ? 'Guardando...' : 'Cambiar nombre' }}</button>
    </div>
    <p class="hint">Al cambiar de nombre, se te pedirá que inicies sesión de nuevo.</p>
  </section>

  <section class="section">
    <h2>Foto de perfil</h2>
    <div class="row input-group">
      <input class="control" [(ngModel)]="avatarUrl" placeholder="Pegar URL de imagen" />
      <button class="btn" (click)="setAvatarFromUrl()" [disabled]="isSaving || !avatarUrl">Vista previa</button>
      <button class="btn" (click)="applyUrlAvatar()" [disabled]="isSaving || !avatarUrl">Aplicar imagen</button>
    </div>
    <div class="row input-group">
      <label class="file-drop control">
        <input #fileInput type="file" (change)="onFileChange($event)" />
        <span>Arrastra o selecciona una imagen</span>
      </label>
      <button class="btn" (click)="toggleFilePreview()" [disabled]="isSaving || !useFile">Vista previa</button>
      <button class="btn" (click)="applyFileAvatar()" [disabled]="isSaving || !useFile">Aplicar imagen</button>
    </div>
    <div *ngIf="avatarPreview" class="preview">
      <p>Previsualización:</p>
      <img [src]="avatarPreview" alt="avatar preview" />
    </div>
  </section>

  <section class="section">
    <h2>Apariencia</h2>
    <div class="row theme-row">
      <span class="theme-label">{{ theme === 'dark' ? '🌚 Modo oscuro activado' : '🌞 Modo claro activado' }}</span>
      <button class="btn btn-theme" (click)="toggleTheme()">
        {{ theme === 'dark' ? 'Cambiar a modo claro' : 'Cambiar a modo oscuro' }}
      </button>
    </div>
  </section>

  <div *ngIf="error" class="alert error">{{ error }}</div>
  <div *ngIf="success" class="alert success">{{ success }}</div>
</div>
