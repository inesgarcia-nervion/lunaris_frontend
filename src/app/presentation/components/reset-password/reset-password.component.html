<div class="page-wrap">
  <a class="back-arrow" title="Volver" (click)="router.navigate(['/login']); $event.preventDefault()">←</a>

  <header class="brand">
    <img src="/assets/LunarisLogo.png" class="brand-icon" width="150" height="150" alt="Lunaris" />
    <h2 class="title">Nueva contraseña</h2>
  </header>

  <main class="card">
    <!-- Validando token -->
    <div *ngIf="validating" class="loading-container">
      <p>Validando enlace...</p>
    </div>

    <!-- Token inválido -->
    <div *ngIf="!validating && !tokenValid" class="error-container">
      <p class="error">{{ error }}</p>
      <button class="submit" (click)="router.navigate(['/recuperar-contrasena'])">
        Solicitar nuevo enlace
      </button>
    </div>

    <!-- Token válido - mostrar formulario -->
    <form *ngIf="!validating && tokenValid" (ngSubmit)="submit()" class="login-form" autocomplete="off">
      <div class="field">
        <label class="label">Nueva contraseña</label>
        <div class="password-row">
          <input 
            class="input" 
            [(ngModel)]="newPassword" 
            name="newPassword" 
            [type]="showPassword ? 'text' : 'password'" 
            placeholder="Introduce tu nueva contraseña" 
            required 
          />
          <button type="button" class="eye" (click)="togglePassword()">
            <svg *ngIf="!showPassword" width="20" height="20" viewBox="0 0 24 24">
              <path fill="#333" d="M12 5c-7 0-11 6-11 7s4 7 11 7 11-6 11-7-4-7-11-7zm0 12a5 5 0 110-10 5 5 0 010 10z" opacity="0.3"/>
              <path fill="#333" d="M2 2l20 20-1.5 1.5L.5 3.5 2 2z"/>
            </svg>
            <svg *ngIf="showPassword" width="20" height="20" viewBox="0 0 24 24">
              <path fill="#333" d="M12 5c-7 0-11 6-11 7s4 7 11 7 11-6 11-7-4-7-11-7zm0 12a5 5 0 110-10 5 5 0 010 10z"/>
            </svg>
          </button>
        </div>
      </div>

      <div class="field">
        <label class="label">Confirmar contraseña</label>
        <div class="password-row">
          <input 
            class="input" 
            [(ngModel)]="confirmPassword" 
            name="confirmPassword" 
            [type]="showConfirmPassword ? 'text' : 'password'" 
            placeholder="Repite tu nueva contraseña" 
            required 
          />
          <button type="button" class="eye" (click)="toggleConfirmPassword()">
            <svg *ngIf="!showConfirmPassword" width="20" height="20" viewBox="0 0 24 24">
              <path fill="#333" d="M12 5c-7 0-11 6-11 7s4 7 11 7 11-6 11-7-4-7-11-7zm0 12a5 5 0 110-10 5 5 0 010 10z" opacity="0.3"/>
              <path fill="#333" d="M2 2l20 20-1.5 1.5L.5 3.5 2 2z"/>
            </svg>
            <svg *ngIf="showConfirmPassword" width="20" height="20" viewBox="0 0 24 24">
              <path fill="#333" d="M12 5c-7 0-11 6-11 7s4 7 11 7 11-6 11-7-4-7-11-7zm0 12a5 5 0 110-10 5 5 0 010 10z"/>
            </svg>
          </button>
        </div>
      </div>

      <p *ngIf="message" class="success">{{ message }}</p>
      <p *ngIf="error" class="error">{{ error }}</p>

      <button class="submit" type="submit" [disabled]="loading">
        <span *ngIf="!loading">Cambiar contraseña</span>
        <span *ngIf="loading">Guardando...</span>
      </button>

      <div class="links">
        <a href="javascript:void(0)" (click)="router.navigate(['/login'])">Volver al login</a>
      </div>
    </form>
  </main>
</div>
