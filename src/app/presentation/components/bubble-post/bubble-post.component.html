<div class="bubble-post" (click)="onMaybeOpen($event)">
  <div class="post-header">
    <img *ngIf="post.user.avatarUrl; else avatarLetter" [src]="post.user.avatarUrl" class="avatar">
    <ng-template #avatarLetter>
      <div class="avatar letter">{{ post.user.name.charAt(0) }}</div>
    </ng-template>
    <div class="user-name">{{ post.user.name }}</div>
  </div>

  <div class="post-body">
    <div *ngIf="images.length" class="post-image">
      <img [src]="firstImageSrc()" alt="post image">
    </div>
    <div class="post-text" [class.full]="!images.length">{{ post.text }}</div>
  </div>

  <div class="post-actions">
    <button class="like" (click)="$event.stopPropagation(); onToggleLike()">❤️ {{ post.likes }}</button>
    <button class="comment" (click)="$event.stopPropagation()">💬 {{ post.comments?.length || 0 }}</button>
    <button class="edit" (click)="$event.stopPropagation(); onEdit()">✏️</button>

    <ng-container *ngIf="canDelete">
      <button class="btn-delete" (click)="$event.stopPropagation(); onDeleteConfirm()">Eliminar</button>
    </ng-container>
  </div>
</div>
