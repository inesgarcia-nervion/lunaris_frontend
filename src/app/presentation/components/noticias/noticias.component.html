<!-- Componente: noticias -->
<!-- Contenedor principal de noticias: lista y creación -->
<div class="noticias-container">
  <h1>Noticias</h1>

  <!-- Botón flotante para crear noticias (solo admins) -->
  <button *ngIf="isAdmin" class="floating-create" (click)="openCreateModal()" aria-label="Crear noticia">+</button>

  <!-- Modal de creación de noticia (solo admins) -->
  <div *ngIf="showCreateModal" class="create-modal-overlay">
    <!-- Contenido modal: formulario crear noticia -->
    <div class="create-modal">
      <button class="close-modal" (click)="closeCreateModal()">✕</button>
      <h3>Crear noticia</h3>
      <input [(ngModel)]="title" placeholder="Título" />
      <input [(ngModel)]="text" placeholder="Descripción (resumen opcional)" />
      <div #bodyEditor contenteditable="true" class="news-body-editor editable" (input)="onBodyInput(bodyEditor)" (keydown)="onBodyKeydown($event, bodyEditor)" aria-label="Contenido de la noticia (obligatorio)"></div>
      <input #fileInput type="file" (change)="onFileChange($event)" accept="image/*" />
      <div *ngIf="imageData" class="image-preview create-modal-preview">
        <button class="preview-remove" (click)="$event.stopPropagation(); clearImage()" aria-label="Eliminar imagen">✕</button>
        <img [src]="imageData" alt="preview" />
      </div>
      <div class="modal-actions">
        <button (click)="addNews()">Crear</button>
        <button class="cancel" (click)="closeCreateModal()">Cancelar</button>
      </div>
    </div>
  </div>


  <div *ngIf="news.length === 0" class="empty-news">No hay noticias aún.</div>


  <!-- Lista de noticias disponibles -->
  <div class="news-list">
    <div *ngFor="let n of pagedNews" class="news-card" (click)="openDetail(n.id)" role="button" tabindex="0">
      <div class="news-meta">
        <h2>{{ n.title }}</h2>
        <span class="news-date">{{ n.date | date:"d 'de' MMMM 'de' y, HH:mm" }}</span>
      </div>
      <p class="news-summary">{{ n.text ? (n.text | slice:0:140) + (n.text.length>140 ? '...' : '') : '' }}</p>
      <div *ngIf="n.image" class="news-image">
        <img [src]="n.image" alt="imagen noticia" />
      </div>
      <div *ngIf="isAdmin" class="news-actions">
        <ng-container *ngIf="pendingDeleteId !== n.id">
          <button class="btn-delete" (click)="$event.stopPropagation(); requestInlineDelete(n.id)">Eliminar</button>
        </ng-container>
        <ng-container *ngIf="pendingDeleteId === n.id" class="inline-confirm">
          <span>¿Eliminar?</span>
          <button class="confirm-yes" (click)="$event.stopPropagation(); removeConfirmed(n.id)">Sí</button>
          <button class="confirm-no" (click)="$event.stopPropagation(); cancelRemove()">No</button>
        </ng-container>
      </div>
    </div>
  </div>

  <app-pagination *ngIf="news.length > pageSize"
    [totalItems]="news.length"
    [pageSize]="pageSize"
    [currentPage]="currentPage"
    (pageChange)="onPageChange($event)">
  </app-pagination>
</div>
