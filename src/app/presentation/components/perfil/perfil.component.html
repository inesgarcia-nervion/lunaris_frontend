<div class="perfil-container">
    <div class="perfil-header">
    <div class="avatar-wrapper">
      <span *ngIf="isAdmin" class="small-crown">👑</span>
      <div class="avatar"><img *ngIf="avatar; else noAvatar" [src]="avatar" alt="avatar" (error)="onAvatarError()" /></div>
      <ng-template #noAvatar><div class="avatar">👤</div></ng-template>
    </div>
    <h1 class="username">{{ username || 'Usuario' }}</h1>
  </div>

  <div class="sections">
    <div class="section-card">
      <h3>Leyendo</h3>
      <div class="books-row">
        <div *ngFor="let b of leyendo" class="mini-book">
          <img [src]="getCoverUrl(b)" [alt]="b.title" />
        </div>
        <div class="more-btn" role="button" tabindex="0" (click)="navigateToList(leyendoId)" (keydown.enter)="navigateToList(leyendoId)">→</div>
      </div>
    </div>

    <div class="section-card">
      <h3>Leído</h3>
      <div class="books-row">
        <div *ngFor="let b of leido" class="mini-book">
          <img [src]="getCoverUrl(b)" [alt]="b.title" />
        </div>
        <div class="more-btn" role="button" tabindex="0" (click)="navigateToList(leidoId)" (keydown.enter)="navigateToList(leidoId)">→</div>
      </div>
    </div>

    <div class="section-card">
      <h3>Plan para leer</h3>
      <div class="books-row">
        <div *ngFor="let b of planParaLeer" class="mini-book">
          <img [src]="getCoverUrl(b)" [alt]="b.title" />
        </div>
        <div class="more-btn" role="button" tabindex="0" (click)="navigateToList(planParaLeerId)" (keydown.enter)="navigateToList(planParaLeerId)">→</div>
      </div>
    </div>
  </div>

  <div class="your-lists">
    <h3>Tus listas</h3>
    <div class="lists-grid-profile">
      <div *ngFor="let l of userLists" class="list-card-profile" (click)="navigateToList(l.id)" role="button" tabindex="0">
        <span class="privacy-pill" [ngClass]="l.isPrivate ? 'pill-private' : 'pill-public'" title="{{ l.isPrivate ? 'Privada' : 'Pública' }}">{{ l.isPrivate ? 'Privada' : 'Pública' }}</span>
        <div class="list-row-top">
          <div class="list-covers small">
            <div *ngFor="let b of l.libros | slice:0:4" class="list-cover">
              <img [src]="getCoverUrl(b)" [alt]="b.title" />
            </div>
          </div>
        </div>
        <h4 class="list-name">{{ l.nombre }}</h4>
        <div class="list-actions-row">
          <button type="button" class="btn-discover" (click)="navigateToList(l.id); $event.stopPropagation()">Descúbrela</button>
        </div>
      </div>
    </div>
    <div *ngIf="userLists.length === 0" class="empty-lists">Aún no tienes listas creadas.</div>
  </div>
  
  <div class="favorite-lists" *ngIf="favoriteLists && favoriteLists.length > 0">
    <h3>Listas en favoritos</h3>
    <div class="lists-grid-profile">
      <div *ngFor="let l of favoriteLists" class="list-card-profile" (click)="navigateToList(l.id)" role="button" tabindex="0">
        <span class="privacy-pill" [ngClass]="l.isPrivate ? 'pill-private' : 'pill-public'" title="{{ l.isPrivate ? 'Privada' : 'Pública' }}">{{ l.isPrivate ? 'Privada' : 'Pública' }}</span>
        <div class="list-row-top">
          <div class="list-covers small">
            <div *ngFor="let b of l.libros | slice:0:4" class="list-cover">
              <img [src]="getCoverUrl(b)" [alt]="b.title" />
            </div>
          </div>
        </div>
        <h4 class="list-name">{{ l.nombre }}</h4>
        <div class="list-owner">Por {{ l.owner }}</div>
        <div class="list-actions-row">
          <button type="button" class="btn-discover" (click)="navigateToList(l.id); $event.stopPropagation()">Descúbrela</button>
        </div>
      </div>
    </div>
  </div>
</div>
