<!-- Componente: lista-detalle -->
<!-- Contenedor de detalle de lista: cabecera, grid de libros y acciones -->
<div class="lista-detalle-container">
  <button class="btn-back" (click)="back()">{{ backButtonLabel }}</button>

  <div *ngIf="lista; else notFound" class="lista-content">
    <!-- Cabecera de la lista: título, propietario y acciones -->
    <div class="lista-header">
      <div style="display:flex; align-items:center; gap:12px;">
        <h1 class="lista-title">{{ lista.nombre }}</h1>
        <span class="privacy-badge" [ngClass]="lista.isPrivate ? 'privacy-private' : 'privacy-public'">{{ lista.isPrivate ? 'Privada' : 'Pública' }}</span>
      </div>
      <div style="display:flex; align-items:center; gap:8px;">
        <div *ngIf="lista.owner && (lista.owner === currentUser || auth.isAdmin()) && !isProfileList(lista.nombre)" class="lista-actions">
        <button class="btn-edit-list" (click)="openEditModal()" *ngIf="lista.owner === currentUser">Editar</button>
        <button class="btn-delete" (click)="confirmAndDeleteList()">Eliminar lista</button>
      </div>
        <button *ngIf="lista.owner && lista.owner !== currentUser && isFavorited() && !lista.isPrivate" class="btn-delete-like-news" (click)="$event.stopPropagation(); confirmAndRemoveFavorite()">Eliminar favorito</button>
      </div>
    </div>

    <!-- Mensaje si la lista está vacía -->
    <div *ngIf="(lista.libros || []).length === 0" class="lista-empty">
      <p>Esta lista está vacía. Añade libros desde la búsqueda.</p>
    </div>
    <div *ngIf="(lista.libros || []).length > 0" class="libros-grid">
      <div *ngFor="let book of pagedLibros" class="libro-item">
        <div class="libro-card-box" (click)="openFromDetail(book)">
          <img class="libro-cover" [src]="getCover(book)" alt="portada" />
          <h3 class="libro-title">{{ book.title }}</h3>
          <p class="libro-author">{{ getAuthor(book) }}</p>
          <button class="btn-delete btn-delete--small btn-delete--muted" (click)="removeFromList(lista.id, book, $event)">Eliminar</button>
        </div>
      </div>
    </div>

    <!-- Paginación para la lista de libros -->
    <app-pagination *ngIf="(lista.libros || []).length > pageSize"
      [totalItems]="(lista.libros || []).length"
      [pageSize]="pageSize"
      [currentPage]="currentPage"
      (pageChange)="onPageChange($event)">
    </app-pagination>
  </div>

  <!-- Template alternativo si no se encuentra la lista -->
  <ng-template #notFound>
    <p>Lista no encontrada.</p>
  </ng-template>
</div>

<!-- Modal de edición de lista -->
<div *ngIf="editingList" class="edit-list-overlay">
  <div class="edit-list-modal" role="dialog" aria-modal="true" aria-label="Editar lista">
    <button class="close-edit-modal" (click)="cancelEdit()">✕</button>
    <div class="edit-list-header">
      <h3>Editar lista</h3>
    </div>
    <div class="edit-list-body">
      <label class="edit-list-label" for="edit-list-nombre">Nombre</label>
      <input id="edit-list-nombre" class="edit-list-input" type="text" [(ngModel)]="editNombre" maxlength="100" placeholder="Nombre de la lista" />
      <div class="edit-list-privacy">
        <span class="edit-list-label">Visibilidad</span>
        <div class="privacy-toggle">
          <button class="privacy-btn" [class.active]="!editIsPrivate" (click)="editIsPrivate = false">Pública</button>
          <button class="privacy-btn" [class.active]="editIsPrivate" (click)="editIsPrivate = true">Privada</button>
        </div>
      </div>
    </div>
    <div class="edit-list-actions">
      <button class="btn-save-list" (click)="saveEdit()" [disabled]="!editNombre.trim() || !hasChanges()">Guardar</button>
      <button class="btn-cancel-list" (click)="cancelEdit()">Cancelar</button>
    </div>
  </div>
</div>
