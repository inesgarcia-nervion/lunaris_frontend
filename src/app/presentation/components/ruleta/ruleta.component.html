<!-- Componente: ruleta -->
<div class="ruleta-container">
  <h1>Ruleta aleatoria</h1>

  <div class="card">
    <div class="big-box">
      <ng-container *ngIf="spinning || !resultBook">
        <div class="wheel-wrap">
          <div class="wheel"
               [class.spinning]="spinning"
            (transitionend)="onWheelTransitionEnd($event)"
               [style.width.px]="wheelSize"
               [style.height.px]="wheelSize"
               [style.background]="wheelBackground"
               [style.transform]="'rotate(' + rotationDeg + 'deg)'"
               [style.transition]="spinning ? ('transform ' + spinDurationMs + 'ms cubic-bezier(.2,.9,.2,1)') : 'none'">

            <!-- Separadores entre los segmentos -->
            <svg *ngIf="titles.length > 1"
                 [attr.width]="wheelSize"
                 [attr.height]="wheelSize"
                 style="position:absolute;top:0;left:0;pointer-events:none;border-radius:50%;overflow:hidden;z-index:1;">
              <line *ngFor="let line of sliceLines"
                    [attr.x1]="wheelSize / 2"
                    [attr.y1]="wheelSize / 2"
                    [attr.x2]="line.x2"
                    [attr.y2]="line.y2"
                    stroke="#000"
                    stroke-width="2" />
            </svg>

            <!-- Etiqueta central para un solo segmento -->
              <div *ngIf="titles.length === 1"
                class="wheel-center-label"
                [ngStyle]="{ color: '#000' }">{{ titles[0] }}</div>

            <!-- Etiquetas para múltiples segmentos -->
            <ng-container *ngIf="titles.length > 1">
              <div *ngFor="let t of titles; let i = index"
                   class="wheel-item"
                   [style.transform]="'rotate(' + (i * anglePer + anglePer/2) + 'deg) translateY(-' + labelOffset + 'px)'"
                   style="z-index:2;">
                 <div class="wheel-item-label"
                   [class.selected]="i === selectedIndex"
                   [style.transform]="labelTransform(i)"
                   [style.width.px]="radius"
                   [style.maxWidth.px]="radius"
                   [style.marginLeft.px]="-halfRadius"
                   [style.fontSize.px]="labelFontSize"
                   [ngStyle]="{ color: '#000' }"
                   title="{{ t }}">{{ truncateTitle(t) }}</div>
              </div>
            </ng-container>

          </div>

          <div class="pointer" aria-hidden="true">▼</div>
        </div>
      </ng-container>

      <ng-container *ngIf="!spinning && resultBook">
        <div class="result-card">
          <div class="cover-wrap">
            <img class="result-cover" [src]="getCover(resultBook)" alt="Portada" />
          </div>

          <div class="result-info">
            <div class="title-row">
              <div class="accent-bar" aria-hidden="true"></div>
              <div class="titles">
                <div class="result-title">{{ resultBook.title }}</div>
                <div class="result-author">{{ bookService.getFirstAuthor(resultBook) }}</div>
              </div>
            </div>

            <div class="result-meta-row">
              <span class="chip" *ngIf="resultBook.firstPublishYear">{{ resultBook.firstPublishYear }}</span>
            </div>

            <div class="result-actions">
              <button (click)="quitarLibro()" [disabled]="!resultBook || spinning">Añadir a Leyendo y quitar de la lista</button>
            </div>
          </div>
        </div>
      </ng-container>
    </div>

    <div class="controls">
      <label>Elegir lista:</label>
      <select [(ngModel)]="selectedListId" (change)="onSelectList()">
        <option [ngValue]="null">-- Seleccionar --</option>
        <option *ngFor="let l of listas" [ngValue]="l.id">{{ l.nombre }} ({{ l.libros?.length || 0 }})</option>
      </select>

      <div class="buttons">
        <button (click)="comenzarRuleta()" [disabled]="!canStart">Comenzar</button>
      </div>
    </div>
  </div>
</div>
