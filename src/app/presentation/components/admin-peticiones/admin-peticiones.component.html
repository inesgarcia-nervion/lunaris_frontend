<!-- Contenedor admin-peticiones: lista de peticiones y acciones -->
<div class="admin-peticiones">
  <h2>Peticiones de libros</h2>
  <div *ngIf="deleteSuccess" class="review-alert review-success">{{ deleteSuccess }}</div>
  <!-- Mensajes de estado -->
  <div *ngIf="loading">Cargando...</div>
  <div *ngIf="error" class="error">{{error}}</div>

  <!-- Mensaje si no hay peticiones -->
  <div *ngIf="!loading && requests.length === 0">No hay peticiones actualmente.</div>

  <!-- Lista de peticiones -->
  <div class="cards">
    <div class="card" *ngFor="let r of pagedRequests">
      <div class="card-body">
        <div class="title">{{r.title}}</div>
        <div class="author">{{r.author}}</div>
      </div>
      <div class="card-badge">Petición <span class="badge">{{r.count}}</span></div>
      <div class="card-actions">
        <button class="btn-delete" (click)="removeGroup(r)" [disabled]="deletingGroupKey === r.key">{{ deletingGroupKey === r.key ? 'Eliminando...' : 'Eliminar' }}</button>
      </div>
    </div>
  </div>

  <!-- Paginación -->
  <app-pagination *ngIf="groupedRequests.length > pageSize"
    [totalItems]="groupedRequests.length"
    [pageSize]="pageSize"
    [currentPage]="currentPage"
    (pageChange)="onPageChange($event)">
  </app-pagination>
</div>
