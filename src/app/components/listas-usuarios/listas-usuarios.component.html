<div class="listas-usuarios-container">
  <div class="listas-header">
    <h1 class="listas-title">Listas de usuarios</h1>
    <button class="btn-add-circle" (click)="crearLista()" aria-label="Crear nueva lista">+</button>
  </div>
  <!-- Input inline para crear nueva lista -->
  <div *ngIf="showCreateInput" class="create-list-row">
    <input
      type="text"
      [(ngModel)]="newListName"
      (keyup.enter)="confirmCreate()"
      (keyup.esc)="cancelCreate()"
      placeholder="Nombre de la nueva lista"
      class="input-crear-lista"
      autofocus
    />
    <button class="btn-confirm" (click)="confirmCreate()">Crear</button>
    <button class="btn-cancel" (click)="cancelCreate()">Cancelar</button>
  </div>

  <div class="listas-actions">
    <input
      type="text"
      [(ngModel)]="search"
      (input)="onSearch()"
      placeholder="Buscar listas"
      class="input-buscar-lista"
    />
  </div>

  <div *ngIf="filteredListas.length === 0" class="listas-vacio">
    <p>No hay listas creadas todavía.</p>
  </div>

  <!-- Mostrar la lista más reciente en grande arriba, el resto en la rejilla -->
  <div *ngIf="(filteredListas?.length ?? 0) > 0" class="lista-featured">
    <h2 class="lista-nombre">{{ filteredListas[0]?.nombre }}</h2>
    <div *ngIf="filteredListas[0].libros.length > 0" class="previews">
      <img *ngFor="let book of filteredListas[0].libros | slice:0:5" [src]="getCoverForTemplate(book)" class="preview-img" [alt]="getTitleForTemplate(book)" />
      <div *ngIf="filteredListas[0].libros.length > 5" class="more-badge">+{{ filteredListas[0].libros.length - 5 }}</div>
    </div>
    <button class="btn-go-list" (click)="router.navigate(['/listas', filteredListas[0].id])" aria-label="Ver lista">→</button>
  </div>

  <div *ngIf="(filteredListas?.length ?? 0) > 1" class="listas-grid">
    <div *ngFor="let lista of filteredListas | slice:1" class="lista-card">
      <h2 class="lista-nombre">{{ lista.nombre }}</h2>
      <div *ngIf="lista.libros.length > 0" class="previews">
        <img *ngFor="let book of lista.libros | slice:0:5" [src]="getCoverForTemplate(book)" class="preview-img" [alt]="getTitleForTemplate(book)" />
        <div *ngIf="lista.libros.length > 5" class="more-badge">+{{ lista.libros.length - 5 }}</div>
      </div>
      <button class="btn-go-list" (click)="router.navigate(['/listas', lista.id])" aria-label="Ver lista">→</button>
      <!-- Aquí puedes mostrar más info de la lista -->
    </div>
  </div>
</div>
