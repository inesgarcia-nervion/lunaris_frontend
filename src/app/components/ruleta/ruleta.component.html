<div class="ruleta-container">
  <h1>Ruleta aleatoria</h1>

  <div class="card">
    <div class="big-box">
      <ng-container *ngIf="!loading && !resultBook">
        <div class="placeholder">Ruleta aleatoria</div>
      </ng-container>

      <ng-container *ngIf="loading">
        <div class="loading-state">
          <div class="spinner" aria-hidden="true"></div>
          <div class="loading-text">Cargando...</div>
        </div>
      </ng-container>

      <ng-container *ngIf="!loading && resultBook">
        <div class="result-card">
          <img class="result-cover" [src]="getCover(resultBook)" alt="Portada" />
          <div class="result-info">
            <div class="result-title">{{ resultBook.title }}</div>
            <div class="result-author">{{ bookService.getFirstAuthor(resultBook) }}</div>
            <div class="result-meta">{{ resultBook.firstPublishYear ? ('Primera edición: ' + resultBook.firstPublishYear) : '' }}</div>
          </div>
        </div>
      </ng-container>
    </div>

    <div class="controls">
      <label>Elegir lista:</label>
      <select [(ngModel)]="selectedListId" (change)="onSelectList()">
        <option [ngValue]="null">-- Seleccionar --</option>
        <option *ngFor="let l of listas" [ngValue]="l.id">{{ l.nombre }} ({{ l.libros?.length || 0 }})</option>
      </select>

      <div class="buttons">
        <button (click)="comenzarRuleta()" [disabled]="loading || !selectedListId">Comenzar</button>
        <button (click)="quitarLibro()" [disabled]="!resultBook">Quitar libro de la lista</button>
      </div>
    </div>
  </div>
</div>
